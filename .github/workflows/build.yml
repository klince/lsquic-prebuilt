name: build-lsquic

# 多平台预编译 lsquic（静态库）+ 其依赖 boringssl(libssl/libcrypto)。
# 产物上传为 artifact，并在打 tag 时附到 GitHub Release。
# 主项目（hook/System/3rd/lsquic）只下载这些产物，无需任何编译工具链。

on:
  push:
    tags:
      - 'v*'          # 打 v* tag 时构建并发 Release
  workflow_dispatch:  # 也可手动触发（仅出 artifact，不发 Release）

env:
  # lsquic 子模块已固定在 v4.7.1（见仓库 .gitmodules / submodule commit）
  # boringssl 版本跟随 lsquic README 推荐的稳定版本
  BORINGSSL_REF: '0.20250807.0'

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-14          # Apple Silicon
            name: macos-arm64
          - os: windows-latest
            name: windows-x64

    steps:
      - name: Checkout (with lsquic submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go (required by BoringSSL)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # ----- Unix 前置：确保 ninja 可用（mac/Linux runner 一般已预装）-----
      - name: Ensure Ninja (Unix)
        if: runner.os != 'Windows'
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            if [ "$(uname -s)" = "Darwin" ]; then brew install ninja; else sudo apt-get update && sudo apt-get install -y ninja-build; fi
          fi
          ninja --version

      # ----- Windows 专用前置：NASM（boringssl 汇编）+ Perl + zlib（lsquic 依赖）-----
      - name: Install Windows build prerequisites
        if: runner.os == 'Windows'
        run: |
          choco install nasm strawberryperl -y --no-progress
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH
          vcpkg install zlib:x64-windows-static
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      # ----- 拉取并固定 BoringSSL 版本 -----
      - name: Clone BoringSSL
        run: |
          git clone https://boringssl.googlesource.com/boringssl boringssl
          cd boringssl
          git checkout ${{ env.BORINGSSL_REF }}

      # ----- 编 BoringSSL（静态库 Release）-----
      # 用 Ninja 生成器：默认满核并行，且 mac/Linux 行为一致
      # （裸 `make -j` 在 mac 上可能不并行，导致 BoringSSL 编译极慢）
      - name: Build BoringSSL (Unix)
        if: runner.os != 'Windows'
        run: |
          cd boringssl
          cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON -B build
          cmake --build build --config Release --parallel

      - name: Build BoringSSL (Windows)
        if: runner.os == 'Windows'
        run: |
          cd boringssl
          # 静态 CRT(/MT, /MTd) 以匹配 HookMFC 工程（MT_Static*）。CMP0091=NEW 让该变量生效。
          cmake -B build `
                -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
                "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded`$<`$<CONFIG:Debug>:Debug>"
          cmake --build build --config Release --parallel -- /m
          cmake --build build --config Debug   --parallel -- /m

      # ----- 整理 BoringSSL 产物到 lsquic 期望的布局 (LIBSSL_DIR/lib + LIBSSL_DIR/include) -----
      # 新版 BoringSSL 库可能落在 build/ 顶层或 build/ssl|crypto/ 或 build/Release/，统一收到 lib/。
      - name: Arrange BoringSSL libs (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p boringssl/lib
          find boringssl/build \( -name 'libssl.a' -o -name 'libcrypto.a' \) -exec cp -f {} boringssl/lib/ \;
          ls -l boringssl/lib
          test -f boringssl/lib/libssl.a
          test -f boringssl/lib/libcrypto.a

      - name: Arrange BoringSSL libs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Release + Debug 分别整理到 lib/Release 与 lib/Debug（lsquic 用 LIBSSL_DIR 搜 PATH_SUFFIXES Release/Debug）
          New-Item -ItemType Directory -Force -Path boringssl/lib/Release,boringssl/lib/Debug | Out-Null
          # MSVC multi-config 产物在 build/<sub>/Release 和 build/<sub>/Debug
          Get-ChildItem -Recurse -Path boringssl/build -Filter ssl.lib    | Where-Object { $_.FullName -match '\\Release\\' } | Select-Object -First 1 | Copy-Item -Destination boringssl/lib/Release/
          Get-ChildItem -Recurse -Path boringssl/build -Filter crypto.lib | Where-Object { $_.FullName -match '\\Release\\' } | Select-Object -First 1 | Copy-Item -Destination boringssl/lib/Release/
          Get-ChildItem -Recurse -Path boringssl/build -Filter ssl.lib    | Where-Object { $_.FullName -match '\\Debug\\' }   | Select-Object -First 1 | Copy-Item -Destination boringssl/lib/Debug/
          Get-ChildItem -Recurse -Path boringssl/build -Filter crypto.lib | Where-Object { $_.FullName -match '\\Debug\\' }   | Select-Object -First 1 | Copy-Item -Destination boringssl/lib/Debug/
          Get-ChildItem -Recurse boringssl/lib

      # ----- 编 lsquic，指向整理后的 BoringSSL；强制 BoringSSL 以跳过静态库符号检测 -----
      - name: Build lsquic (Unix)
        if: runner.os != 'Windows'
        run: |
          cd lsquic
          cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DLSQUIC_SHARED_LIB=OFF \
                -DLSQUIC_BIN=OFF -DLSQUIC_TESTS=OFF \
                -DLSQUIC_LIBSSL=BORINGSSL \
                -DBORINGSSL_INCLUDE=$GITHUB_WORKSPACE/boringssl/include \
                -DLIBSSL_DIR=$GITHUB_WORKSPACE/boringssl \
                -B build
          cmake --build build --config Release --parallel

      - name: Build lsquic (Windows)
        if: runner.os == 'Windows'
        run: |
          cd lsquic
          # lsquic 在 Windows 硬编码 /WX(warning-as-error)，新版 MSVC 的 C5286(enum 隐式转换)
          # 会把告警当错误。用 EXTRA_CFLAGS 追加 /WX- 关掉（CMakeLists 把 EXTRA_CFLAGS 拼在 -WX 之后）。
          $env:EXTRA_CFLAGS = "/WX- /wd5286"
          # 静态 CRT(/MT, /MTd) 以匹配 HookMFC 工程
          $rt = "-DCMAKE_POLICY_DEFAULT_CMP0091=NEW"
          $rtlib = "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded`$<`$<CONFIG:Debug>:Debug>"
          # lsquic 通过 LIBSSL_DIR 的 FIND_LIBRARY 定位 boringssl 库，结果在 configure 时固定，
          # 不随 --config 变；故 Release/Debug 各 configure 到独立 build 目录，分别指向对应 boringssl 子目录。
          # ---- Release ----
          cmake -DLSQUIC_SHARED_LIB=OFF -DLSQUIC_BIN=OFF -DLSQUIC_TESTS=OFF `
                -DLSQUIC_LIBSSL=BORINGSSL `
                -DBORINGSSL_INCLUDE="$env:GITHUB_WORKSPACE/boringssl/include" `
                -DLIBSSL_DIR="$env:GITHUB_WORKSPACE/boringssl/lib/Release" `
                -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
                -DVCPKG_TARGET_TRIPLET=x64-windows-static `
                $rt $rtlib `
                -B build-release
          cmake --build build-release --config Release --parallel -- /m
          # ---- Debug ----
          cmake -DLSQUIC_SHARED_LIB=OFF -DLSQUIC_BIN=OFF -DLSQUIC_TESTS=OFF `
                -DLSQUIC_LIBSSL=BORINGSSL `
                -DBORINGSSL_INCLUDE="$env:GITHUB_WORKSPACE/boringssl/include" `
                -DLIBSSL_DIR="$env:GITHUB_WORKSPACE/boringssl/lib/Debug" `
                -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
                -DVCPKG_TARGET_TRIPLET=x64-windows-static `
                $rt $rtlib `
                -B build-debug
          cmake --build build-debug --config Debug --parallel -- /m

      # ----- 收集产物：库 + 头文件 -----
      - name: Collect artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          OUT="out/lsquic-${{ matrix.name }}"
          mkdir -p "$OUT/lib" "$OUT/include"
          # lsquic 静态库
          find lsquic/build -name 'liblsquic.a' -exec cp {} "$OUT/lib/" \;
          # boringssl 静态库
          find boringssl/build -name 'libssl.a'    -exec cp {} "$OUT/lib/" \;
          find boringssl/build -name 'libcrypto.a' -exec cp {} "$OUT/lib/" \;
          # 头文件
          cp -R lsquic/include/* "$OUT/include/"
          cp -R boringssl/include/* "$OUT/include/"
          # 版本信息
          {
            echo "lsquic: $(cd lsquic && git describe --tags --always)"
            echo "boringssl: ${{ env.BORINGSSL_REF }}"
            echo "platform: ${{ matrix.name }}"
          } > "$OUT/VERSION.txt"
          ( cd out && tar czf "lsquic-${{ matrix.name }}.tar.gz" "lsquic-${{ matrix.name }}" )

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OUT = "out/lsquic-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "$OUT/lib/Release","$OUT/lib/Debug","$OUT/include" | Out-Null

          # ----- Release 库 -----
          Get-ChildItem -Recurse -Path lsquic/build-release -Filter lsquic.lib | Select-Object -First 1 | Copy-Item -Destination "$OUT/lib/Release/"
          Copy-Item boringssl/lib/Release/ssl.lib    "$OUT/lib/Release/"
          Copy-Item boringssl/lib/Release/crypto.lib "$OUT/lib/Release/"
          $zlibR = Get-ChildItem -Recurse -Path "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/lib" -Filter zlib.lib -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zlibR) { Copy-Item $zlibR.FullName "$OUT/lib/Release/" }

          # ----- Debug 库 -----
          Get-ChildItem -Recurse -Path lsquic/build-debug -Filter lsquic.lib | Select-Object -First 1 | Copy-Item -Destination "$OUT/lib/Debug/"
          Copy-Item boringssl/lib/Debug/ssl.lib    "$OUT/lib/Debug/"
          Copy-Item boringssl/lib/Debug/crypto.lib "$OUT/lib/Debug/"
          # vcpkg static debug zlib 名为 zlibd.lib，位于 debug/lib
          $zlibD = Get-ChildItem -Recurse -Path "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static/debug/lib" -Filter zlibd.lib -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zlibD) { Copy-Item $zlibD.FullName "$OUT/lib/Debug/" }

          # ----- 头文件（Release/Debug 共用）-----
          Copy-Item -Recurse -Force lsquic/include/*    "$OUT/include/"
          Copy-Item -Recurse -Force boringssl/include/* "$OUT/include/"
          "lsquic: ${{ matrix.name }}`r`nboringssl: ${{ env.BORINGSSL_REF }}`r`nconfigs: Release, Debug" | Out-File -Encoding utf8 "$OUT/VERSION.txt"
          Get-ChildItem -Recurse "$OUT/lib"
          Compress-Archive -Path "$OUT" -DestinationPath "out/lsquic-${{ matrix.name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsquic-${{ matrix.name }}
          path: |
            out/lsquic-${{ matrix.name }}.tar.gz
            out/lsquic-${{ matrix.name }}.zip
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          generate_release_notes: true
